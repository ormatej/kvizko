<!DOCTYPE html>
<html lang="en" class="admin-view">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kvizko - Admin Panel</title>
  <link rel="stylesheet" href="/css/mirc.css">
</head>
<body class="scanlines">
  <!-- Auth Screen -->
  <div class="join-container" id="authScreen">
    <div class="join-box">
      <h1>KVIZKO</h1>
      <div class="subtitle">[ admin panel ]</div>
      <form id="authForm">
        <div class="form-group">
          <label>Admin Password</label>
          <input type="password" id="adminPassword" placeholder="Enter password..." required>
        </div>
        <button type="submit" class="btn">LOGIN</button>
        <div class="error-msg hidden" id="authError"></div>
      </form>
      <div class="brand">powered by Tenzor d.o.o.</div>
    </div>
  </div>

  <!-- Admin Dashboard -->
  <div class="admin-container hidden" id="adminDashboard">
    <div class="admin-header">
      <h1>KVIZKO ADMIN</h1>
      <div>
        <span id="adminGameCode" style="color:var(--accent);font-size:14px;margin-right:16px;"></span>
        <span id="adminGameStatus" style="color:var(--text-muted);font-size:13px;"></span>
      </div>
    </div>

    <div class="admin-body">
      <!-- Game Setup Panel -->
      <div class="admin-panel" id="setupPanel">
        <h2>Game Setup</h2>
        <div id="setupForm">
          <label style="color:var(--text-muted);font-size:12px;">Question Set</label>
          <select id="questionSelect"></select>

          <label style="color:var(--text-muted);font-size:12px;">Time per Question (seconds)</label>
          <input type="number" id="timePerQuestion" value="30" min="5" max="120">

          <label style="color:var(--text-muted);font-size:12px;">Questions per Game (0 = all)</label>
          <input type="number" id="questionsPerGame" value="0" min="0" max="9999">

          <div style="margin:10px 0">
            <label style="color:var(--text-muted);font-size:12px;">
              <input type="checkbox" id="shuffleQuestions" checked> Shuffle questions
            </label>
          </div>
        <div style="margin:10px 0">
          <label style="color:var(--text-muted);font-size:12px;">
            <input type="checkbox" id="shuffleOptions" checked> Shuffle ABCD options
          </label>
        </div>

          <label style="color:var(--text-muted);font-size:12px;">Theme</label>
          <select id="themeSelect">
            <option value="default">mIRC Classic (White)</option>
            <option value="auraverse">Auraverse (White / Pastel Rainbow)</option>
            <option value="tenzor">Tenzor (Dark / Red / Grey)</option>
          </select>

          <button class="btn" id="createGameBtn" style="margin-top:10px;">CREATE GAME</button>
        </div>

        <div class="hidden" id="gameCreated" style="margin-top:20px;">
          <div class="game-code-display" id="displayCode"></div>
          <div id="qrContainer" style="text-align:center;margin:10px 0;max-width:160px;margin-left:auto;margin-right:auto;"></div>
          <div style="text-align:center;margin:8px 0;" id="joinUrlDisplay"></div>
          <button class="btn hidden" id="newGameBtn" style="margin-top:14px;background:var(--text-error);">NEW GAME</button>
        </div>
      </div>

      <!-- Game Controls Panel -->
      <div class="admin-panel" id="controlsPanel">
        <h2>Game Controls</h2>
        <div class="btn-row">
          <button class="btn-sm primary" id="startBtn" disabled>Start</button>
          <button class="btn-sm" id="pauseBtn" disabled>Pause</button>
          <button class="btn-sm" id="resumeBtn" disabled>Resume</button>
          <button class="btn-sm" id="skipBtn" disabled>Skip</button>
          <button class="btn-sm" id="hintBtn" disabled>Hint</button>
          <button class="btn-sm" id="scoresBtn" disabled>Scores</button>
          <button class="btn-sm danger" id="stopBtn" disabled>Stop</button>
        </div>

        <div style="margin-top:20px;">
          <h2>Send Message</h2>
          <div style="display:flex;gap:8px;">
            <input type="text" id="adminMsg" placeholder="Bot announcement..." style="flex:1;">
            <button class="btn-sm" id="sayBtn">Say</button>
          </div>
        </div>

        <div style="margin-top:20px;">
          <h2>Command Line</h2>
          <div style="display:flex;gap:8px;">
            <input type="text" id="cmdInput" placeholder="!command..." style="flex:1;">
            <button class="btn-sm" id="cmdBtn">Run</button>
          </div>
        </div>
      </div>

      <!-- Players Panel -->
      <div class="admin-panel">
        <h2>Players (<span id="playerCount">0</span>)</h2>
        <ul class="player-list" id="adminPlayerList"></ul>

        <div style="margin-top:20px;">
          <h2>Scoreboard</h2>
          <div id="adminScoreboard"></div>
        </div>
      </div>

      <!-- Event Log Panel -->
      <div class="admin-panel">
        <h2>Event Log</h2>
        <div class="admin-log" id="adminLog"></div>

        <div style="margin-top:20px;">
          <h2>Export</h2>
          <div class="btn-row">
            <button class="btn-sm" id="exportLeadsBtn">Export Leads (CSV)</button>
            <button class="btn-sm" id="exportScoresBtn">Export Scores (CSV)</button>
          </div>
          <div style="margin-top:12px;">
            <button class="btn-sm danger" id="resetLeaderboardBtn">Reset Leaderboard</button>
          </div>
        </div>
      </div>

      <!-- Live Channel View -->
      <div class="admin-panel admin-channel-view">
        <h2>Live Channel View</h2>
        <div class="channel-view-wrap">
          <div class="channel-view-bar">
            <span class="channel-name">#tenzor-kvizko</span>
            <span class="channel-topic" id="channelViewTopic">Waiting for game to start...</span>
            <span class="channel-view-timer hidden" id="channelViewTimer">30s</span>
          </div>
          <div class="channel-view-timer-bar hidden" id="channelViewTimerBar">
            <div class="timer-fill" id="channelViewTimerFill"></div>
          </div>
          <div class="channel-view-messages" id="channelViewMessages"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  (function() {
    'use strict';

    let adminPassword = '';
    let currentGameCode = null;
    let socket = null;

    const authScreen = document.getElementById('authScreen');
    const adminDashboard = document.getElementById('adminDashboard');
    const authError = document.getElementById('authError');

    // Auth
    document.getElementById('authForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      adminPassword = document.getElementById('adminPassword').value;
      authError.classList.add('hidden');

      try {
        const res = await fetch('/api/admin/auth', {
          method: 'POST',
          headers: { 'x-admin-password': adminPassword }
        });
        if (!res.ok) throw new Error('Wrong password');
        authScreen.classList.add('hidden');
        adminDashboard.classList.remove('hidden');
        loadQuestionSets();
      } catch (err) {
        authError.textContent = err.message || 'Auth failed';
        authError.classList.remove('hidden');
      }
    });

    async function loadQuestionSets() {
      const res = await fetch('/api/questions');
      const files = await res.json();
      const select = document.getElementById('questionSelect');
      select.innerHTML = '';
      files.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.filename;
        opt.textContent = `${f.title} (${f.count} questions)`;
        select.appendChild(opt);
      });
    }

    // Create Game
    document.getElementById('createGameBtn').addEventListener('click', async () => {
      const questionFile = document.getElementById('questionSelect').value;
      if (!questionFile) return;

      const theme = document.getElementById('themeSelect').value;
      const settings = {
        timePerQuestion: parseInt(document.getElementById('timePerQuestion').value) || 30,
        questionsPerGame: parseInt(document.getElementById('questionsPerGame').value) || 0,
        shuffleQuestions: document.getElementById('shuffleQuestions').checked,
        shuffleOptions: document.getElementById('shuffleOptions').checked,
        theme: theme
      };

      try {
        const res = await fetch('/api/games', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-password': adminPassword },
          body: JSON.stringify({ questionFile, settings })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        currentGameCode = data.code;
        document.getElementById('displayCode').textContent = data.code;

        const joinLink = document.createElement('a');
        joinLink.href = data.joinUrl;
        joinLink.textContent = data.joinUrl;
        joinLink.target = '_blank';
        joinLink.style.cssText = 'color:var(--accent);font-size:12px;word-break:break-all;';
        const joinContainer = document.getElementById('joinUrlDisplay');
        joinContainer.innerHTML = '';
        joinContainer.appendChild(joinLink);

        document.getElementById('adminGameCode').textContent = `Game: ${data.code}`;
        document.getElementById('adminGameStatus').textContent = 'Status: waiting';

        const qrRes = await fetch(`/api/games/${data.code}/qr`);
        const qrSvg = await qrRes.text();
        document.getElementById('qrContainer').innerHTML = qrSvg;

        document.getElementById('setupForm').classList.add('hidden');
        document.getElementById('gameCreated').classList.remove('hidden');
        document.documentElement.setAttribute('data-theme', theme);

        connectSocket(data.code);
        enableControls(true);
        log(`Game created: ${data.code} (${data.questionCount} questions)`);

        const controlsPanel = document.getElementById('controlsPanel');
        if (controlsPanel) {
          controlsPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      } catch (err) {
        log(`Error: ${err.message}`);
      }
    });

    // --- Channel View helpers ---
    const cvMessages = document.getElementById('channelViewMessages');
    const cvTopic = document.getElementById('channelViewTopic');
    const cvTimer = document.getElementById('channelViewTimer');
    const cvTimerBar = document.getElementById('channelViewTimerBar');
    const cvTimerFill = document.getElementById('channelViewTimerFill');
    let cvTimerInterval = null;

    function cvTime() {
      const d = new Date();
      return `[${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}]`;
    }

    function escHtml(s) {
      const el = document.createElement('span');
      el.textContent = s;
      return el.innerHTML;
    }

    function cvAdd(html, cls) {
      const div = document.createElement('div');
      div.className = 'msg' + (cls ? ' ' + cls : '');
      div.innerHTML = html;
      cvMessages.appendChild(div);
      cvMessages.scrollTop = cvMessages.scrollHeight;
    }

    function cvBot(text) {
      cvAdd(`<span class="timestamp">${cvTime()}</span> <span class="nick bot">&lt;KvizkoBot&gt;</span> ${escHtml(text)}`);
    }

    function cvAction(text) {
      cvAdd(`<span class="timestamp">${cvTime()}</span> * KvizkoBot ${escHtml(text)}`, 'action');
    }

    function cvSystem(text) {
      cvAdd(`<span class="timestamp">${cvTime()}</span> — ${escHtml(text)}`, 'system');
    }

    function cvStartTimer(totalMs) {
      cvTimer.classList.remove('hidden');
      cvTimerBar.classList.remove('hidden');
      const started = Date.now();
      clearInterval(cvTimerInterval);
      cvTimerInterval = setInterval(() => {
        let remaining = totalMs - (Date.now() - started);
        if (remaining < 0) remaining = 0;
        cvTimer.textContent = `${Math.ceil(remaining / 1000)}s`;
        const pct = (remaining / totalMs) * 100;
        cvTimerFill.style.width = pct + '%';
        cvTimerFill.className = 'timer-fill';
        if (pct < 33) cvTimerFill.classList.add('danger');
        else if (pct < 66) cvTimerFill.classList.add('warning');
        if (remaining <= 0) clearInterval(cvTimerInterval);
      }, 100);
    }

    function cvStopTimer() {
      clearInterval(cvTimerInterval);
      cvTimer.classList.add('hidden');
      cvTimerBar.classList.add('hidden');
    }

    function connectSocket(code) {
      socket = io();
      socket.on('connect', () => {
        socket.emit('admin:auth', { gameCode: code, password: adminPassword }, (res) => {
          if (res.error) {
            log(`Auth error: ${res.error}`);
            return;
          }
          log('Connected as admin');
          cvSystem('Connected to channel #tenzor-kvizko as admin');
          cvTopic.textContent = res.gameTitle || 'Kvizko Game';
          updatePlayers(res.players);
          updateScoreboard(res.scoreboard);
        });
      });

      socket.on('player:joined', (data) => {
        log(`${data.nickname} joined (${data.playerCount} players)`);
        cvAction(`${data.nickname} has joined #tenzor-kvizko (${data.playerCount} players)`);
        refreshGameState();
      });

      socket.on('player:left', (data) => {
        log(`${data.nickname} left (${data.playerCount} players)`);
        cvAction(`${data.nickname} has left (${data.playerCount} players)`);
        refreshGameState();
      });

      socket.on('game:countdown', (data) => {
        log('Game starting...');
        document.getElementById('adminGameStatus').textContent = 'Status: starting';
        cvAction('Game starting...');
      });

      socket.on('round:question', (data) => {
        log(`Q${data.index + 1}/${data.total}: ${data.question} [${data.type}]`);
        document.getElementById('adminGameStatus').textContent = `Status: Q${data.index + 1}/${data.total}`;
        cvTopic.textContent = `${data.category || 'Quiz'} — Question ${data.index + 1}/${data.total}`;
        cvStartTimer(data.timeMs);
        cvAdd(`<span class="timestamp">${cvTime()}</span> <span class="nick bot">&lt;KvizkoBot&gt;</span> <span class="question-text">Q${data.index + 1}: ${escHtml(data.question)}</span>`);
        if (data.type === 'abcd' && data.options) {
          cvBot(`A) ${data.options.A}`);
          cvBot(`B) ${data.options.B}`);
          cvBot(`C) ${data.options.C}`);
          cvBot(`D) ${data.options.D}`);
        }
      });

      socket.on('round:hint', (data) => {
        cvAdd(`<span class="timestamp">${cvTime()}</span> <span class="nick bot">&lt;KvizkoBot&gt;</span> HINT: <span class="hint-text">${escHtml(data.hint)}</span>`);
      });

      socket.on('round:correct', (data) => {
        log(`✓ ${data.nickname} answered correctly (+${data.points} pts)`);
        cvStopTimer();
        const streakText = data.streak >= 3 ? ` 🔥 ${data.streak} streak!` : '';
        cvAdd(`<span class="timestamp">${cvTime()}</span> * <span class="correct-text">${escHtml(data.nickname)} got it right! +${data.points} pts (${(data.timeMs/1000).toFixed(1)}s)${streakText}</span>`);
        refreshGameState();
      });

      socket.on('round:playerAnswered', (data) => {
        log(`${data.nickname} answered (${data.totalAnswered}/${data.totalPlayers})`);
        cvSystem(`${data.nickname} answered. (${data.totalAnswered}/${data.totalPlayers})`);
      });

      socket.on('round:wrong', (data) => {
        log(`✗ ${data.nickname} wrong: "${data.answer}"`);
        cvAdd(`<span class="timestamp">${cvTime()}</span> <span class="nick" style="color:${data.color}">&lt;${escHtml(data.nickname)}&gt;</span> <span class="wrong-text">${escHtml(data.answer)}</span>`);
      });

      socket.on('round:ended', (data) => {
        log(`Round ended. ${data.correctCount}/${data.totalPlayers} correct. Answer: ${data.answer}`);
        cvStopTimer();
        cvAction(`Answer: ${data.answer}`);
        cvSystem(`${data.correctCount}/${data.totalPlayers} players got it right.`);
        if (data.scoreboard && data.scoreboard.length) {
          const top = data.scoreboard.map(s => `${s.nickname}: ${s.points}`).join(' | ');
          cvBot(`Top scores: ${top}`);
        }
        if (data.scoreboard) updateScoreboard(data.scoreboard);
        refreshGameState();
      });

      socket.on('round:skipped', (data) => {
        log(`Question skipped. Answer: ${data.answer}`);
        cvStopTimer();
        cvAction(`Question skipped. Answer was: ${data.answer}`);
      });

      socket.on('game:paused', () => {
        log('Game paused');
        document.getElementById('adminGameStatus').textContent = 'Status: paused';
        cvStopTimer();
        cvAction('Game paused by quiz master.');
      });

      socket.on('game:resumed', () => {
        log('Game resumed');
        cvAction('Game resumed!');
      });

      socket.on('chat:message', (data) => {
        cvAdd(`<span class="timestamp">${cvTime()}</span> <span class="nick" style="color:${data.color}">&lt;${escHtml(data.nickname)}&gt;</span> ${escHtml(data.message)}`);
      });

      socket.on('chat:bot', (data) => {
        cvBot(data.message);
      });

      socket.on('game:ended', (data) => {
        log('GAME OVER');
        cvStopTimer();
        cvAction('GAME OVER!');
        if (data.scoreboard && data.scoreboard.length) {
          cvBot('=== FINAL SCOREBOARD ===');
          data.scoreboard.forEach((s, i) => {
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${s.rank}`;
            cvBot(`${medal} ${s.nickname} — ${s.points} pts (${s.correct} correct)`);
          });
        }
        if (data.autoRestart) {
          document.getElementById('adminGameStatus').textContent = 'Status: ended (restarting...)';
          log('New game will start automatically in 15 seconds...');
          cvSystem('A new game will start automatically...');
          cvTopic.textContent = 'Game Over — New game starting soon...';
        } else {
          document.getElementById('adminGameStatus').textContent = 'Status: ended';
          cvTopic.textContent = 'Game Over — Thanks for playing!';
        }
        if (data.scoreboard) updateScoreboard(data.scoreboard);
        if (!data.autoRestart) {
          enableControls(false);
          document.getElementById('newGameBtn').classList.remove('hidden');
        }
      });

      socket.on('game:restarting', (data) => {
        log(`New game starting in ${data.seconds}s...`);
        document.getElementById('adminGameStatus').textContent = 'Status: restarting';
        cvAction(`New game starting in ${data.seconds} seconds!`);
        cvTopic.textContent = 'New game starting...';
        updateScoreboard([]);
        enableControls(true);
      });

      socket.on('scoreboard:update', (data) => {
        if (data.scoreboard) {
          updateScoreboard(data.scoreboard);
          const top = data.scoreboard.map(s => `#${s.rank} ${s.nickname}: ${s.points}`).join(' | ');
          cvBot(`Scoreboard: ${top}`);
        }
      });

      socket.on('admin:help', (data) => {
        data.commands.forEach(c => log(c));
      });

      socket.on('admin:error', (data) => {
        log(`Error: ${data.message}`);
      });
    }

    async function refreshGameState() {
      if (!currentGameCode) return;
      try {
        const res = await fetch(`/api/games/${currentGameCode}`);
        const data = await res.json();
        updatePlayers(data.players);
        updateScoreboard(data.scoreboard);
      } catch {}
    }

    function updatePlayers(players) {
      const list = document.getElementById('adminPlayerList');
      list.innerHTML = '';
      (players || []).forEach(p => {
        const li = document.createElement('li');
        li.style.color = p.color;
        li.textContent = p.nickname;
        list.appendChild(li);
      });
      document.getElementById('playerCount').textContent = (players || []).length;
    }

    function updateScoreboard(scoreboard) {
      const container = document.getElementById('adminScoreboard');
      if (!scoreboard || !scoreboard.length) {
        container.innerHTML = '<div style="color:var(--text-muted);font-size:12px;">No scores yet</div>';
        return;
      }
      container.innerHTML = scoreboard.map((s, i) => {
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${s.rank}`;
        return `<div style="padding:3px 0;font-size:13px;"><span style="color:${s.color || 'var(--text-muted)'}">${medal} ${s.nickname}</span> — <span style="color:var(--accent)">${s.points} pts</span> (${s.correct} correct)</div>`;
      }).join('');
    }

    function enableControls(enabled) {
      ['startBtn','pauseBtn','resumeBtn','skipBtn','hintBtn','scoresBtn','stopBtn'].forEach(id => {
        document.getElementById(id).disabled = !enabled;
      });
    }

    function sendCommand(cmd) {
      if (!socket || !currentGameCode) return;
      socket.emit('admin:command', { command: cmd });
      log(`> ${cmd}`);
    }

    document.getElementById('startBtn').addEventListener('click', () => sendCommand('!start'));
    document.getElementById('pauseBtn').addEventListener('click', () => sendCommand('!pause'));
    document.getElementById('resumeBtn').addEventListener('click', () => sendCommand('!resume'));
    document.getElementById('skipBtn').addEventListener('click', () => sendCommand('!skip'));
    document.getElementById('hintBtn').addEventListener('click', () => sendCommand('!hint'));
    document.getElementById('scoresBtn').addEventListener('click', () => sendCommand('!scores'));
    document.getElementById('stopBtn').addEventListener('click', () => {
      if (confirm('End the game?')) sendCommand('!stop');
    });

    document.getElementById('sayBtn').addEventListener('click', () => {
      const msg = document.getElementById('adminMsg').value.trim();
      if (msg) { sendCommand(`!say ${msg}`); document.getElementById('adminMsg').value = ''; }
    });

    document.getElementById('cmdInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const cmd = document.getElementById('cmdInput').value.trim();
        if (cmd) { sendCommand(cmd); document.getElementById('cmdInput').value = ''; }
      }
    });
    document.getElementById('cmdBtn').addEventListener('click', () => {
      const cmd = document.getElementById('cmdInput').value.trim();
      if (cmd) { sendCommand(cmd); document.getElementById('cmdInput').value = ''; }
    });

    // Export
    document.getElementById('exportLeadsBtn').addEventListener('click', async () => {
      if (!currentGameCode) return;
      try {
        const res = await fetch(`/api/games/${currentGameCode}`);
        const data = await res.json();
        const players = data.players || [];
        let csv = 'Nickname,Email\n';
        players.forEach(p => { csv += `"${p.nickname}","${p.email || ''}"\n`; });
        downloadCSV(csv, `kvizko-leads-${currentGameCode}.csv`);
      } catch {}
    });

    document.getElementById('exportScoresBtn').addEventListener('click', async () => {
      if (!currentGameCode) return;
      try {
        const res = await fetch(`/api/games/${currentGameCode}`);
        const data = await res.json();
        const scores = data.scoreboard || [];
        let csv = 'Rank,Nickname,Points,Correct\n';
        scores.forEach(s => { csv += `${s.rank},"${s.nickname}",${s.points},${s.correct}\n`; });
        downloadCSV(csv, `kvizko-scores-${currentGameCode}.csv`);
      } catch {}
    });

    function downloadCSV(csv, filename) {
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    // Reset Leaderboard
    document.getElementById('resetLeaderboardBtn').addEventListener('click', async () => {
      if (!confirm('This will delete ALL game scores, answer logs, and game history. Continue?')) return;
      try {
        const res = await fetch('/api/leaderboard', {
          method: 'DELETE',
          headers: { 'x-admin-password': adminPassword }
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        log('Leaderboard reset successfully');
      } catch (err) {
        log(`Reset error: ${err.message}`);
      }
    });

    // New Game — reset setup panel
    function resetSetup() {
      if (socket) { socket.disconnect(); socket = null; }
      currentGameCode = null;
      document.getElementById('setupForm').classList.remove('hidden');
      document.getElementById('gameCreated').classList.add('hidden');
      document.getElementById('newGameBtn').classList.add('hidden');
      document.getElementById('adminGameCode').textContent = '';
      document.getElementById('adminGameStatus').textContent = '';
      document.getElementById('displayCode').textContent = '';
      document.getElementById('qrContainer').innerHTML = '';
      document.getElementById('joinUrlDisplay').innerHTML = '';
      document.getElementById('adminPlayerList').innerHTML = '';
      document.getElementById('playerCount').textContent = '0';
      document.getElementById('adminScoreboard').innerHTML = '<div style="color:var(--text-muted);font-size:12px;">No scores yet</div>';
      enableControls(false);
      loadQuestionSets();
    }

    document.getElementById('newGameBtn').addEventListener('click', resetSetup);

    // Theme — persist last selection
    const savedTheme = localStorage.getItem('kvizko_theme');
    if (savedTheme) {
      document.getElementById('themeSelect').value = savedTheme;
      document.documentElement.setAttribute('data-theme', savedTheme);
    }
    document.getElementById('themeSelect').addEventListener('change', (e) => {
      document.documentElement.setAttribute('data-theme', e.target.value);
      localStorage.setItem('kvizko_theme', e.target.value);
    });

    // Log
    function log(msg) {
      const container = document.getElementById('adminLog');
      const d = new Date();
      const time = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
      container.innerHTML += `<div class="log-entry"><span class="log-time">[${time}]</span> ${msg}</div>`;
      container.scrollTop = container.scrollHeight;
    }

  })();
  </script>
</body>
</html>
