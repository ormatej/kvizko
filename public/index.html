<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kvizko - Join Game</title>
  <meta name="description" content="Join a Kvizko retro quiz game - real-time trivia for events">
  <meta name="theme-color" content="#003399">
  <link rel="stylesheet" href="/css/mirc.css">
</head>
<body class="scanlines">
  <div class="join-container" id="joinPage" role="main">
    <div class="join-box">
      <h1>KVIZKO</h1>
      <div class="subtitle" aria-label="Retro quiz experience">[ retro quiz experience ]</div>

      <form id="joinForm" aria-label="Join game form">
        <div class="form-group">
          <label for="nickname">Nickname</label>
          <input type="text" id="nickname" placeholder="Your IRC nick..." maxlength="20" autocomplete="off" required aria-required="true">
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="your@email.com" autocomplete="email" aria-describedby="emailHint">
          <span id="emailHint" style="display:none;">Optional - for prize contact</span>
        </div>
        <button type="submit" class="btn" id="joinBtn">JOIN CHANNEL</button>
        <div class="error-msg hidden" id="joinError" role="alert" aria-live="assertive"></div>
      </form>

      <div class="brand">powered by Tenzor d.o.o.</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    (function() {
      fetch('/api/channel')
        .then(r => r.json())
        .then(data => {
          if (data.theme) document.documentElement.setAttribute('data-theme', data.theme);
        })
        .catch(() => {});

      document.getElementById('joinForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const nick = document.getElementById('nickname').value.trim();
        const email = document.getElementById('email').value.trim();
        const errorEl = document.getElementById('joinError');
        const btn = document.getElementById('joinBtn');

        if (!nick) {
          errorEl.textContent = 'Nickname is required.';
          errorEl.classList.remove('hidden');
          return;
        }

        btn.disabled = true;
        btn.textContent = 'CONNECTING...';
        errorEl.classList.add('hidden');

        const socket = io();
        socket.on('connect', () => {
          socket.emit('join', { nickname: nick, email }, (res) => {
            if (res.error) {
              errorEl.textContent = res.error;
              errorEl.classList.remove('hidden');
              btn.disabled = false;
              btn.textContent = 'JOIN CHANNEL';
              socket.disconnect();
              return;
            }

            sessionStorage.setItem('kvizko_nick', nick);
            sessionStorage.setItem('kvizko_email', email);
            sessionStorage.setItem('kvizko_data', JSON.stringify(res));

            window.location.href = '/game.html';
          });
        });

        socket.on('connect_error', () => {
          errorEl.textContent = 'Cannot connect to server.';
          errorEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'JOIN CHANNEL';
        });
      });
    })();
  </script>
</body>
</html>
