<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kvizko - Leaderboard</title>
  <link rel="stylesheet" href="/css/mirc.css">
  <style>
    .live-badge {
      display: inline-block;
      background: #ff3333;
      color: #fff;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      animation: livePulse 2s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .live-badge.final {
      background: var(--accent);
      animation: none;
    }
    .score-row {
      transition: all 0.3s ease;
    }
    .score-row.highlight {
      background: var(--highlight-row, rgba(0,0,0,0.04));
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to { opacity: 1; transform: translateX(0); }
    }
    .score-row {
      animation: slideIn 0.3s ease-out both;
    }
  </style>
</head>
<body class="scanlines">
  <div class="leaderboard-container">
    <div class="leaderboard-header">
      <h1>KVIZKO</h1>
      <div class="game-info" id="gameInfo">
        <span class="live-badge">LIVE</span>
        <span id="gameTitle" style="margin-left:10px;">Waiting for game...</span>
      </div>
    </div>

    <!-- Podium -->
    <div class="podium hidden" id="podium">
      <div class="podium-place second" id="podium2">
        <div class="podium-rank">2</div>
        <div class="podium-nick" id="podium2Nick">&mdash;</div>
        <div class="podium-score" id="podium2Score">0 pts</div>
      </div>
      <div class="podium-place first" id="podium1">
        <div class="podium-rank">1</div>
        <div class="podium-nick" id="podium1Nick">&mdash;</div>
        <div class="podium-score" id="podium1Score">0 pts</div>
      </div>
      <div class="podium-place third" id="podium3">
        <div class="podium-rank">3</div>
        <div class="podium-nick" id="podium3Nick">&mdash;</div>
        <div class="podium-score" id="podium3Score">0 pts</div>
      </div>
    </div>

    <!-- Last Game Banner (alltime mode) -->
    <div class="hidden" id="lastGameBanner" style="width:100%;max-width:700px;margin-bottom:20px;background:var(--bg-secondary);border:1px solid var(--border);padding:16px;">
      <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">Last Game Played</div>
      <div id="lastGameBannerTitle" style="font-size:16px;font-weight:700;color:var(--text-primary);"></div>
      <div id="lastGameBannerScores" style="margin-top:8px;font-size:13px;"></div>
    </div>

    <!-- Score Table -->
    <table class="score-table" id="scoreTable">
      <thead>
        <tr id="scoreTableHead">
          <th class="rank-col">#</th>
          <th>Player</th>
          <th style="text-align:right;">Correct</th>
          <th class="points-col">Points</th>
        </tr>
      </thead>
      <tbody id="scoreBody">
        <tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:40px;">Waiting for game data...</td></tr>
      </tbody>
    </table>

    <!-- QR Code Corner -->
    <div class="qr-corner" id="qrCorner">
      <div id="qrCode"></div>
      <div class="qr-label">Scan to join!</div>
    </div>

    <div style="margin-top:40px;text-align:center;color:var(--text-muted);font-size:12px;">
      powered by <span style="color:var(--accent);">Tenzor d.o.o.</span>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
  (function() {
    'use strict';

    const params = new URLSearchParams(window.location.search);
    const mode = params.get('mode') || 'game'; // 'game' or 'alltime'

    const podium = document.getElementById('podium');
    const scoreBody = document.getElementById('scoreBody');
    const gameTitle = document.getElementById('gameTitle');

    // Load QR (always the same root URL)
    fetch('/api/qr')
      .then(r => r.text())
      .then(svg => { document.getElementById('qrCode').innerHTML = svg; })
      .catch(() => {});

    if (mode === 'alltime') {
      document.querySelector('.live-badge').textContent = 'ALL TIME';
      gameTitle.textContent = 'All-Time Leaderboard';
      document.getElementById('scoreTableHead').innerHTML = `
        <th class="rank-col">#</th>
        <th>Player</th>
        <th style="text-align:center;">Games</th>
        <th style="text-align:right;">Correct</th>
        <th class="points-col">Points</th>
      `;
      loadAllTime();
      setInterval(loadAllTime, 15000);
      return;
    }

    // Live mode -- connect to channel
    fetch('/api/channel')
      .then(r => r.json())
      .then(data => {
        if (data.theme) document.documentElement.setAttribute('data-theme', data.theme);
        if (data.active) {
          gameTitle.textContent = data.title || 'Kvizko Game';
          if (data.scoreboard) renderScoreboard(data.scoreboard);
        }
      })
      .catch(() => {});

    const socket = io();

    socket.on('connect', () => {
      socket.emit('join', { nickname: `Leaderboard_${Date.now()}`, email: '' }, (res) => {
        if (res.error) {
          gameTitle.textContent = 'Waiting for quiz master to load a game...';
          return;
        }
        if (res.theme) document.documentElement.setAttribute('data-theme', res.theme);
        gameTitle.textContent = res.gameTitle || 'Kvizko Game';
        if (res.scoreboard) renderScoreboard(res.scoreboard);
      });
    });

    socket.on('round:ended', (data) => {
      if (data.scoreboard) renderScoreboard(data.scoreboard);
      refreshFull();
    });

    socket.on('round:correct', () => refreshFull());
    socket.on('scoreboard:update', (data) => {
      if (data.scoreboard) renderScoreboard(data.scoreboard);
    });

    socket.on('game:ended', (data) => {
      const badge = document.querySelector('.live-badge');
      badge.textContent = 'FINAL';
      badge.classList.add('final');
      if (data.scoreboard) renderScoreboard(data.scoreboard);
    });

    socket.on('game:restarting', () => {
      const badge = document.querySelector('.live-badge');
      badge.textContent = 'LIVE';
      badge.classList.remove('final');
      scoreBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:40px;">New game starting...</td></tr>';
      podium.classList.add('hidden');
    });

    socket.on('channel:newgame', (data) => {
      const badge = document.querySelector('.live-badge');
      badge.textContent = 'LIVE';
      badge.classList.remove('final');
      gameTitle.textContent = data.title || 'Kvizko Game';
      if (data.theme) document.documentElement.setAttribute('data-theme', data.theme);
      scoreBody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-muted);padding:40px;">New quiz loaded. Waiting to start...</td></tr>';
      podium.classList.add('hidden');
    });

    async function refreshFull() {
      try {
        const res = await fetch('/api/channel');
        const data = await res.json();
        if (data.active && data.scoreboard) renderScoreboard(data.scoreboard);
      } catch {}
    }

    setInterval(refreshFull, 5000);

    function renderScoreboard(sb) {
      if (!sb || !sb.length) return;

      podium.classList.remove('hidden');

      [1,2,3].forEach(i => {
        const p = sb[i-1];
        document.getElementById(`podium${i}Nick`).textContent = p ? p.nickname : '\u2014';
        document.getElementById(`podium${i}Score`).textContent = p ? `${p.points} pts` : '';
        if (p) document.getElementById(`podium${i}Nick`).style.color = p.color || 'var(--text-primary)';
      });

      scoreBody.innerHTML = '';
      sb.forEach((s, idx) => {
        const tr = document.createElement('tr');
        tr.className = 'score-row';
        if (idx < 3) tr.classList.add('highlight');
        tr.style.animationDelay = `${idx * 40}ms`;
        const gamesCol = s._alltime ? `<td style="text-align:center;">${s.games_played || 0}</td>` : '';
        tr.innerHTML = `
          <td class="rank-col">${s.rank}</td>
          <td style="color:${s.color || 'var(--text-primary)'};font-weight:${idx < 3 ? '700' : '400'}">${s.nickname}</td>
          ${gamesCol}
          <td style="text-align:right;">${s.correct || 0}</td>
          <td class="points-col">${s.points}</td>
        `;
        scoreBody.appendChild(tr);
      });
    }

    async function loadAllTime() {
      try {
        const res = await fetch('/api/leaderboard');
        const data = await res.json();
        const sb = data.map((d, i) => ({
          rank: i + 1,
          nickname: d.nickname,
          points: d.total_points,
          correct: d.total_correct,
          games_played: d.games_played,
          color: 'var(--text-primary)',
          _alltime: true
        }));
        renderScoreboard(sb);
      } catch {}

      try {
        const lgRes = await fetch('/api/last-game');
        const lgData = await lgRes.json();
        if (lgData.lastGame && lgData.scores && lgData.scores.length) {
          const banner = document.getElementById('lastGameBanner');
          banner.classList.remove('hidden');
          document.getElementById('lastGameBannerTitle').textContent = lgData.lastGame.title || lgData.lastGame.code;
          const scoresHtml = lgData.scores.slice(0, 5).map((s, i) => {
            const medal = i === 0 ? '\u{1F947}' : i === 1 ? '\u{1F948}' : i === 2 ? '\u{1F949}' : `#${i+1}`;
            return `${medal} ${s.nickname}: ${s.points} pts`;
          }).join(' &nbsp;|&nbsp; ');
          document.getElementById('lastGameBannerScores').innerHTML = scoresHtml;
        }
      } catch {}
    }

  })();
  </script>
</body>
</html>
